name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Build all PDFs (HTML + QR + OG meta) and sync to Notion
        run: python build.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LAB_SLUG_SALT: ${{ secrets.LAB_SLUG_SALT }}

      - name: Stage public site content
        # Pages must only serve public-safe content. Internal source (build.py,
        # SKILL.md, _migration/, tools/) holds PHI references and must NOT ship.
        run: |
          mkdir -p site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_migration' \
            --exclude='tools' \
            --exclude='reference' \
            --exclude='SKILL.md' \
            --exclude='README.md' \
            --exclude='AGENTS.md' \
            --exclude='build.py' \
            --exclude='*.py' \
            --exclude='__pycache__' \
            --exclude='requirements.txt' \
            --exclude='site' \
            --exclude='.gitignore' \
            ./ site/
          echo "--- site/ top-level ---"
          ls -la site/
          echo "--- verifying build.py NOT present in artifact ---"
          test ! -f site/build.py || (echo "ERROR: build.py leaked into site/" && exit 1)
          test ! -f site/SKILL.md || (echo "ERROR: SKILL.md leaked into site/" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
