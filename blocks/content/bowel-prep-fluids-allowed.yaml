block_id: bowel-prep-fluids-allowed
version: v01
display_name: 장정결 중 허용·금지 음료
description: |
  대장내시경 장정결 중 환자가 마실 수 있는 맑은 액체와
  금지 음료(우유·주스 펄프·붉은/보라색 음료 등) 비교.
applies_to:
  - endoscopy/pre-procedure

content:
  ko: |
    🥤 장정결 중 음료 — OK / NG

    ✅ 허용 (맑은 액체)
    - 생수·미네랄 워터
    - 보리차·옥수수차 (맑게)
    - 사과 주스 (펄프 없는 클리어 타입)
    - 흰색 이온 음료 (포카리스웨트·게토레이 등)
    - 맑은 황태국·맑은 닭 육수
    - 꿀물·설탕물
    - 블랙 커피·티 (우유·크림 X)
    - 투명 젤리 (붉은색·보라색 X)

    ❌ 금지
    - 우유·요거트·라떼 (지방·단백질로 시야 차폐)
    - 토마토 주스·과일 펄프 음료
    - 붉은색·보라색 음료 (포도주스·딸기 음료·블루베리 음료)
      → 장 점막에 색소 잔류 → 출혈로 오인 가능
    - 알코올 (탈수·내시경 약물 상호작용)
    - 진한 콩국물·미음 (고형분)

    💧 충분히 마시기
    - 장정결제와 별개로 추가 수분 1.5-2 L 권장
    - 노인·신부전·심부전 환자는 의사와 섭취량 상의

  html_template: |
    <section class="prep-fluids">
      <h2>🥤 장정결 중 음료 가이드</h2>
      <div class="prep-fluids__cols">
        <div class="prep-fluids__col prep-fluids__col--ok">
          <h3>✅ 마셔도 되는 것</h3>
          <ul>
            <li>생수·보리차·옥수수차</li>
            <li>맑은 사과 주스 (펄프 X)</li>
            <li>흰색 이온 음료</li>
            <li>맑은 황태국·닭 육수</li>
            <li>꿀물·설탕물</li>
            <li>블랙 커피·티 (우유 X)</li>
          </ul>
        </div>
        <div class="prep-fluids__col prep-fluids__col--ng">
          <h3>❌ 마시면 안 되는 것</h3>
          <ul>
            <li>우유·요거트·라떼</li>
            <li>붉은·보라색 음료</li>
            <li>토마토·딸기·블루베리</li>
            <li>과일 펄프가 있는 주스</li>
            <li>알코올</li>
            <li>진한 콩국물·미음</li>
          </ul>
        </div>
      </div>
    </section>
  css: |
    .prep-fluids__cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .prep-fluids__col {
      border-radius: 10px;
      padding: 14px 18px;
    }
    .prep-fluids__col--ok {
      background: var(--gb-success-bg);
      border-left: 4px solid var(--gb-success);
    }
    .prep-fluids__col--ng {
      background: var(--gb-danger-bg);
      border-left: 4px solid var(--gb-danger);
    }
    .prep-fluids__col h3 {
      color: var(--gb-navy);
      font-weight: var(--gb-fw-bold);
    }

visual_constraints:
  layout_columns: 2
  ok_color: "#15803D"
  ng_color: "#DC2626"

safety_check:
  must_include_korean:
    - "맑은"
    - "우유"
    - "붉은"
    - "보라"
    - "탈수"
  forbidden_terms:
    - "우유 OK"
    - "포도주스 OK"
    - "토마토 주스 OK"

source_references:
  - "ASGE Bowel Prep Guideline 2023"
  - "대한소화기내시경학회 대장내시경 가이드라인 2024"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
