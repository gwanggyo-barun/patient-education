block_id: bowel-prep-schedule-2day
version: v02
display_name: 대장내시경 2일 장정결 스케줄
description: |
  대장내시경 검사 전 2일 장정결 (D-2 식이 조절 + D-1 split dose)
  표준 스케줄 표. 오전 검사·오후 검사 분기 포함.
applies_to:
  - endoscopy/pre-procedure

content:
  ko: |
    📅 대장내시경 2일 장정결 — D-2 / D-1 스케줄

    D-2 (검사 2일 전)
    - 견과류·통곡물·콩·옥수수·참깨·고섬유 채소 회피
    - 김치·나물 등 잎채소 회피
    - 부드러운 흰밥·국·삶은 계란·두부·죽 권장

    D-1 (검사 전날) — Split-dose 표준
    - 아침: 죽·미음·맑은 국
    - 점심: 죽·미음·맑은 국 (12시까지)
    - 오후 1시 이후: 식사 중단. 맑은 액체만 허용
    - 오후 6시: 장정결제 1차 복용 (총 용량의 절반)
    - 자정 이후 ~ 검사 4-6시간 전: 장정결제 2차 복용
    - 변이 노란 액체·맑은 액체가 될 때까지 추가 수분 섭취

    검사 당일 (D-day) — 시간별 분기
    - 오전 검사 (예: 09:00): 새벽 04:00-05:00 2차 복용 완료
    - 오후 검사 (예: 14:00): 오전 08:00-09:00 2차 복용 완료
    - 검사 4시간 전: 모든 음식·음료 중단 (맑은 물도)

    ⚠️ 노인·당뇨·신부전 환자
    - 탈수·전해질 이상 위험 → 사전에 의료진과 상의
    - 저용량 prep (sodium picosulfate 등) 고려

  html_template: |
    <section class="prep-schedule">
      <h2>📅 2일 장정결 스케줄</h2>
      <div class="prep-day prep-day--d2">
        <h3>D-2 · 검사 2일 전</h3>
        <p>섬유질 적은 흰밥·국·죽 위주. 통곡물·견과·잎채소 회피.</p>
      </div>
      <div class="prep-day prep-day--d1">
        <h3>D-1 · 검사 전날 (Split-dose)</h3>
        <ul>
          <li>아침·점심: 죽·미음 (12시까지)</li>
          <li>오후 1시 이후: 맑은 액체만</li>
          <li>오후 6시: 장정결제 <strong>1차 복용</strong></li>
          <li>자정 이후: 장정결제 <strong>2차 복용</strong></li>
        </ul>
      </div>
      <div class="prep-day prep-day--dday">
        <h3>D-day · 검사 당일</h3>
        <p>검사 4시간 전 모든 음식·음료 중단. 보호자 동반 필수.</p>
      </div>
    </section>
  css: |
    .prep-schedule {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 12px;
    }
    .prep-day {
      border-radius: 10px;
      padding: 14px 18px;
      border-top: 4px solid var(--gb-steel-blue);
      background: var(--gb-white);
    }
    .prep-day--d1 {
      border-top-color: var(--gb-navy);
      background: var(--gb-steel-blue-light);
    }
    .prep-day--dday {
      border-top-color: var(--gb-warning);
      background: var(--gb-warning-bg);
    }
    .prep-day h3 {
      color: var(--gb-navy);
      font-weight: var(--gb-fw-bold);
      margin: 0 0 6px 0;
    }

visual_constraints:
  layout_columns: 3
  d1_emphasis_color: "#003366"
  dday_emphasis_color: "#F97316"

safety_check:
  must_include_korean:
    - "split-dose"
    - "장정결제"
    - "4시간 전"
    - "맑은"
    - "보호자"
  forbidden_terms:
    - "검사 직전 식사"
    - "임의로 복용량 절반 줄이기"
    - "잎채소 무관"

source_references:
  - "ASGE Guideline on Bowel Preparation 2023"
  - "대한소화기내시경학회 대장내시경 장정결 가이드라인 2024"

