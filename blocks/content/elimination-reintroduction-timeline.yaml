block_id: elimination-reintroduction-timeline
version: v02
display_name: FODMAP 3단계 elimination–reintroduction 타임라인
description: |
  IBS FODMAP 다이어트 3단계 — Elimination (2-6주) →
  Reintroduction (6-8주) → Personalization 의 시각화 타임라인.
applies_to:
  - nutrition/ibs-fodmap

content:
  ko: |
    📅 FODMAP 3단계 타임라인

    1단계 · Elimination (제거) — 2-6주
    - 모든 high-FODMAP 식품 제거
    - low-FODMAP 식품 위주 식단
    - 증상 호전 여부 일지에 기록 (배변·복통·가스·복부 팽만)
    - 호전이 없으면 IBS가 아닐 수 있음 — 재평가

    2단계 · Reintroduction (재도입) — 6-8주
    - 한 번에 한 가지 FODMAP 군 (예: fructose) 시험
    - 3일에 걸쳐 분량 증가 (1/4 → 1/2 → 1회분)
    - 증상이 나타나면 해당 군 회피, 안 나타나면 OK
    - 다음 군 시험 전 3일 washout 기간

    3단계 · Personalization (개인 맞춤) — 평생
    - 자신만의 trigger 식품 회피 + tolerant 식품 자유 섭취
    - 영양 균형을 위해 다양성 유지
    - 증상 재발 시 단기간 elimination 반복 가능

    💡 핵심 원칙
    - 반드시 영양사 또는 의사의 지도하에 진행
    - 평생 모든 식품 금지 X
    - Monash University FODMAP 앱 사용 권장

  html_template: |
    <section class="fodmap-timeline">
      <h2>📅 FODMAP 3단계 타임라인</h2>
      <div class="fodmap-timeline__stages">
        <div class="fodmap-timeline__stage fodmap-timeline__stage--1">
          <div class="fodmap-timeline__num">1</div>
          <h3>Elimination</h3>
          <span class="fodmap-timeline__period">2–6주</span>
          <p>모든 high-FODMAP 제거. 증상 일지 기록.</p>
        </div>
        <div class="fodmap-timeline__arrow">→</div>
        <div class="fodmap-timeline__stage fodmap-timeline__stage--2">
          <div class="fodmap-timeline__num">2</div>
          <h3>Reintroduction</h3>
          <span class="fodmap-timeline__period">6–8주</span>
          <p>한 군씩 3일 단위로 시험·반응 확인.</p>
        </div>
        <div class="fodmap-timeline__arrow">→</div>
        <div class="fodmap-timeline__stage fodmap-timeline__stage--3">
          <div class="fodmap-timeline__num">3</div>
          <h3>Personalization</h3>
          <span class="fodmap-timeline__period">평생</span>
          <p>나만의 trigger 회피·tolerant 자유 섭취.</p>
        </div>
      </div>
    </section>
  css: |
    .fodmap-timeline__stages {
      display: grid;
      grid-template-columns: 1fr 32px 1fr 32px 1fr;
      gap: 12px;
      align-items: stretch;
    }
    .fodmap-timeline__stage {
      background: var(--gb-white);
      border-top: 4px solid var(--gb-steel-blue);
      border-radius: 10px;
      padding: 14px 18px;
      position: relative;
    }
    .fodmap-timeline__stage--2 { border-top-color: var(--gb-navy); }
    .fodmap-timeline__stage--3 { border-top-color: var(--gb-success); }
    .fodmap-timeline__num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gb-navy);
      color: var(--gb-white);
      font-weight: var(--gb-fw-black);
      display: grid;
      place-items: center;
      margin-bottom: 6px;
    }
    .fodmap-timeline__period {
      display: inline-block;
      padding: 2px 8px;
      background: var(--gb-canvas-warm);
      color: var(--gb-ink-soft);
      border-radius: 999px;
      font-size: var(--gb-fs-caption);
      font-weight: var(--gb-fw-semibold);
      margin-bottom: 6px;
    }
    .fodmap-timeline__arrow {
      display: grid;
      place-items: center;
      color: var(--gb-muted);
      font-size: 28px;
    }

visual_constraints:
  stage_count: 3
  must_show_periods: true

safety_check:
  must_include_korean:
    - "Elimination"
    - "Reintroduction"
    - "Personalization"
    - "2-6주"
    - "영양사"
  forbidden_terms:
    - "평생 모든 음식 금지"
    - "완치"
    - "자가 진단 충분"

source_references:
  - "Monash University FODMAP Diet Program 2024"
  - "Halmos EP et al. Gastroenterology 2014/2024 update"

audit:
  created_at: 2026-05-25T09:00:00+09:00
