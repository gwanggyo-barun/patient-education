block_id: fodmap-food-grid-high
version: v02
display_name: 고 FODMAP 음식 그리드 (회피 식품)
description: |
  IBS 환자에게 elimination 단계 (2-6주) 동안 회피해야 할
  high-FODMAP 식품 카테고리별 그리드. Monash University 기준.
applies_to:
  - nutrition/ibs-fodmap

content:
  ko: |
    🚫 High-FODMAP — 2-6주 elimination 동안 회피

    🥬 채소
    - 양파·마늘 (가루·기름 포함)
    - 마늘쫑·부추·아스파라거스
    - 콜리플라워·아티초크
    - 버섯 (양송이·표고)
    - 셀러리 (큰 양)

    🍎 과일
    - 사과·배·수박
    - 망고·체리·자두
    - 복숭아·살구·자몽
    - 건과일 일반·과일 통조림 시럽

    🌾 곡물·콩
    - 밀가루 (빵·국수·과자)
    - 보리·호밀
    - 콩·강낭콩·렌즈콩·병아리콩

    🥛 유제품 (락토스 함유)
    - 우유·요거트·아이스크림
    - 부드러운 치즈 (코티지·리코타·크림 치즈)

    🍯 감미료
    - 꿀·아가베·HFCS
    - 자일리톨·솔비톨·말티톨 (껌·사탕)

    ☕ 음료
    - 청량 음료 (과당 함유)
    - 럼·셰리주
    - 카모마일·우엉차 (일부)

  html_template: |
    <section class="fodmap-high">
      <h2>🚫 High-FODMAP — 회피 식품</h2>
      <p class="fodmap-high__lead">elimination 단계 2-6주간 피해주세요.</p>
      <div class="fodmap-high__grid">
        <div class="fodmap-high__cat" data-cat="vegetables">
          <h3>🥬 채소</h3>
          <p>양파·마늘·부추·콜리플라워·버섯·아스파라거스</p>
        </div>
        <div class="fodmap-high__cat" data-cat="fruits">
          <h3>🍎 과일</h3>
          <p>사과·배·수박·망고·체리·복숭아·자두·자몽</p>
        </div>
        <div class="fodmap-high__cat" data-cat="grains">
          <h3>🌾 곡물·콩</h3>
          <p>밀·보리·호밀·콩·렌즈콩·병아리콩</p>
        </div>
        <div class="fodmap-high__cat" data-cat="dairy">
          <h3>🥛 유제품</h3>
          <p>우유·요거트·연한 치즈·아이스크림</p>
        </div>
        <div class="fodmap-high__cat" data-cat="sweet">
          <h3>🍯 감미료</h3>
          <p>꿀·아가베·HFCS·자일리톨·솔비톨</p>
        </div>
        <div class="fodmap-high__cat" data-cat="drinks">
          <h3>☕ 음료</h3>
          <p>과당 청량음료·럼·일부 허브차</p>
        </div>
      </div>
    </section>
  css: |
    .fodmap-high {
      background: var(--gb-danger-bg);
      border: 1px solid var(--gb-danger);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .fodmap-high__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .fodmap-high__cat {
      background: var(--gb-white);
      border-left: 3px solid var(--gb-danger);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .fodmap-high__cat h3 {
      font-size: var(--gb-fs-body-lg);
      color: var(--gb-navy);
      font-weight: var(--gb-fw-bold);
      margin: 0 0 4px 0;
    }
    .fodmap-high__cat p {
      font-size: var(--gb-fs-caption);
      color: var(--gb-ink-soft);
      line-height: var(--gb-lh-snug);
      margin: 0;
    }

visual_constraints:
  category_count: 6
  grid_columns: 3
  grid_rows: 2

safety_check:
  must_include_korean:
    - "양파"
    - "마늘"
    - "밀"
    - "우유"
    - "elimination"
  forbidden_terms:
    - "평생 모든 음식 금지"
    - "완치 가능"
    - "자가 진단 충분"

source_references:
  - "Monash University FODMAP Diet App (2024 update)"
  - "King's College London FODMAP Diet 2024"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
