block_id: fodmap-food-grid-low
version: v02
display_name: 저 FODMAP 음식 그리드 (안전 식품)
description: |
  IBS 환자가 elimination 단계 동안 안전하게 먹을 수 있는
  low-FODMAP 식품 카테고리별 그리드. Monash University 기준.
applies_to:
  - nutrition/ibs-fodmap

content:
  ko: |
    ✅ Low-FODMAP — 안전하게 드세요

    🥬 채소
    - 당근·시금치·상추·오이
    - 호박 (작은 양)·가지·토마토
    - 청경채·케일
    - 죽순·콩나물 (적당량)
    - 파의 녹색 부분 (흰 부분 X)

    🍎 과일
    - 바나나 (덜 익은 것)·블루베리·딸기
    - 키위·오렌지·귤·포도
    - 파인애플·캔털루프
    - 1회 분량 ½-1컵 권장

    🌾 곡물
    - 쌀 (백미·현미)·메밀
    - 글루텐 프리 빵·국수
    - 귀리 (조정량)
    - 옥수수 (소량)

    🥩 단백질
    - 닭·소고기·돼지고기·생선
    - 두부 (단단한 것)·템페
    - 달걀
    - 일반 가공 없는 육류

    🥛 유제품 대체
    - 락토프리 우유·아몬드 우유
    - 단단한 치즈 (체다·파마산·브리)
    - 락토프리 요거트

    ☕ 음료·기타
    - 물·블랙 커피 (적당량)·홍차 (소량)
    - 메이플 시럽 (소량)·설탕

  html_template: |
    <section class="fodmap-low">
      <h2>✅ Low-FODMAP — 안전 식품</h2>
      <p class="fodmap-low__lead">아래 식품 위주로 식단을 구성하세요.</p>
      <div class="fodmap-low__grid">
        <div class="fodmap-low__cat"><h3>🥬 채소</h3><p>당근·시금치·오이·호박·가지·토마토</p></div>
        <div class="fodmap-low__cat"><h3>🍎 과일</h3><p>덜 익은 바나나·블루베리·딸기·키위·오렌지</p></div>
        <div class="fodmap-low__cat"><h3>🌾 곡물</h3><p>쌀·메밀·글루텐 프리 빵·귀리 (적당량)</p></div>
        <div class="fodmap-low__cat"><h3>🥩 단백질</h3><p>닭·소·돼지·생선·단단한 두부·달걀</p></div>
        <div class="fodmap-low__cat"><h3>🥛 유제품 대체</h3><p>락토프리 우유·아몬드 우유·단단한 치즈</p></div>
        <div class="fodmap-low__cat"><h3>☕ 음료·감미료</h3><p>물·블랙 커피 소량·메이플 시럽·설탕</p></div>
      </div>
    </section>
  css: |
    .fodmap-low {
      background: var(--gb-success-bg);
      border: 1px solid var(--gb-success);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .fodmap-low__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .fodmap-low__cat {
      background: var(--gb-white);
      border-left: 3px solid var(--gb-success);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .fodmap-low__cat h3 {
      font-size: var(--gb-fs-body-lg);
      color: var(--gb-navy);
      font-weight: var(--gb-fw-bold);
      margin: 0 0 4px 0;
    }
    .fodmap-low__cat p {
      font-size: var(--gb-fs-caption);
      color: var(--gb-ink-soft);
      line-height: var(--gb-lh-snug);
      margin: 0;
    }

visual_constraints:
  category_count: 6
  grid_columns: 3
  grid_rows: 2

safety_check:
  must_include_korean:
    - "쌀"
    - "당근"
    - "블루베리"
    - "락토프리"
    - "두부"
  forbidden_terms:
    - "양파 OK"
    - "마늘 무제한"
    - "우유 무제한"

source_references:
  - "Monash University FODMAP Diet App (2024)"
  - "King's College London FODMAP Diet 2024"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
