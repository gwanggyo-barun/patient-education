block_id: glp1-injection-sites-anatomy
version: v02
display_name: GLP-1 자가 주사 부위 해부도
description: |
  GLP-1 (오젬픽·위고비·맙젠다) 피하주사 부위 3곳 (복부·허벅지
  앞쪽·상완 후면) 해부도 + rotation 룰 + 90도 각도 안내.
applies_to:
  - injections/glp-1
  - injections/insulin

content:
  ko: |
    💉 GLP-1 피하 주사 — 부위 3곳

    1️⃣ 복부 (가장 권장)
    - 배꼽 주변 2-3 cm 떨어진 위치
    - 복부 좌·우 4분면을 순환 사용
    - 흡수 속도 가장 빠름 (일관성↑)

    2️⃣ 허벅지 앞쪽
    - 무릎과 골반 사이 가운데 부위
    - 양쪽 허벅지를 번갈아 사용
    - 흡수 속도 중간

    3️⃣ 상완 후면 (위팔 뒤쪽)
    - 어깨와 팔꿈치 사이 가운데
    - 본인이 주사하기 어렵다면 보호자 도움
    - 흡수 속도 가장 느림

    🎯 주사 각도·깊이
    - 90도 각도로 빠르게 삽입
    - 피하 지방층까지 — 근육 주사 X (효과·부작용 변경)
    - 마른 환자는 45도 각도 사용 가능

    🔄 회전(rotation) 룰
    - 매번 다른 위치 (이전 부위에서 2 cm 이상 떨어져)
    - 같은 부위 연속 사용 시 지방위축·결절 형성
    - 한 부위에 멍·붉어짐·딱딱한 부분 있으면 회피

    🚫 회피
    - 흉터·문신·점·튼살 부위
    - 멍·붉어짐·발진·감염 부위
    - 배꼽 주변 2 cm 이내
    - 운동 직전 운동할 부위 (예: 자전거 전 허벅지)

  html_template: |
    <section class="glp1-sites">
      <h2>💉 주사 부위 3곳</h2>
      <div class="glp1-sites__grid">
        <div class="glp1-sites__zone glp1-sites__zone--abdomen">
          <h3>1. 복부</h3>
          <p>가장 권장. 배꼽 2-3 cm 떨어진 위치. 흡수 빠름.</p>
        </div>
        <div class="glp1-sites__zone glp1-sites__zone--thigh">
          <h3>2. 허벅지 앞쪽</h3>
          <p>무릎-골반 가운데. 양쪽 번갈아.</p>
        </div>
        <div class="glp1-sites__zone glp1-sites__zone--arm">
          <h3>3. 상완 후면</h3>
          <p>위팔 뒤쪽. 보호자 도움 가능.</p>
        </div>
      </div>
      <div class="glp1-sites__rules">
        <p>🎯 90도 각도, 피하 지방층 (근육 X)</p>
        <p>🔄 매번 다른 위치 (2 cm 이상 떨어져)</p>
        <p>🚫 흉터·멍·운동할 부위 회피</p>
      </div>
    </section>
  css: |
    .glp1-sites__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .glp1-sites__zone {
      background: var(--gb-canvas-warm);
      border-left: 4px solid var(--gb-steel-blue);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .glp1-sites__zone h3 {
      color: var(--gb-navy);
      font-weight: var(--gb-fw-bold);
      margin: 0 0 4px 0;
    }
    .glp1-sites__rules {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--gb-warning-bg);
      border-radius: 8px;
      font-size: var(--gb-fs-body);
    }

visual_constraints:
  required_visual_areas: 3
  required_anatomy_diagram: true
  rotation_arrow_optional: true

safety_check:
  must_include_korean:
    - "복부"
    - "허벅지"
    - "상완"
    - "90도"
    - "근육"
    - "rotation"
  forbidden_terms:
    - "근육 주사"
    - "동일 부위 연속"
    - "흉터에 주사 OK"
    - "운동할 부위에 주사 OK"

source_references:
  - "Novo Nordisk Ozempic Patient Guide 2024"
  - "Lilly Mounjaro Patient Guide 2024"
  - "ADA Standards of Care 2024 — Insulin Injection Technique"

