block_id: glp1-side-effects-grid
version: v01
display_name: GLP-1 부작용 그리드 (6 tile)
description: |
  GLP-1 RA (semaglutide·tirzepatide·liraglutide) 자가 주사 환자 교육용
  부작용 6가지 시각화 grid. 메스꺼움·구토·췌장염·갑상선·담석·저혈당.
  GLP-1 주사 교육 deck의 8번째 슬라이드(Safety)에 표준 배치.

applies_to:
  - injections/glp-1
  - patient-education/medication-info

content:
  ko: |
    GLP-1 주사 부작용 6가지 — 흔함과 드묾 구분
    1. 메스꺼움·구토 (가장 흔함, 20-30%) — 시작 시·증량 시. 4-8주 적응
    2. 변비·설사 — 식이섬유·수분 섭취. 약 사항 X
    3. 췌장염 (드묾) — 심한 복통 즉시 응급실. 기존 췌장염 환자 회피
    4. 갑상선 C-cell 종양 — 동물 신호 있음 (인간 미확립). 가족력 시 회피
    5. 담석 — 빠른 체중 감량으로 증가. 우상복부 통증 시 평가
    6. 저혈당 (단독 시 거의 없음) — 인슐린·SU 병용 시만 주의

  en: |
    GLP-1 injection side effects — common vs rare
    1. Nausea/vomiting (most common, 20-30%) — onset and dose-titration phase
    2. Constipation/diarrhea — fiber and hydration adjustment
    3. Pancreatitis (rare) — severe abdominal pain → ER. Avoid if prior history
    4. Thyroid C-cell tumor — animal signal (human unestablished). Avoid if FHx
    5. Gallstones — rapid weight loss risk. RUQ pain → evaluate
    6. Hypoglycemia (rare alone) — concern only with insulin/SU co-therapy

visual_constraints:
  layout: pattern-grid pattern-grid--3
  rows: 2
  cols: 3
  tile_padding: var(--space-5)
  tile_border_radius: var(--radius-lg)
  tile_classes:
    common: "tile--warn (yellow tint background)"
    rare_serious: "tile--alert (red tint background)"
    rare_mild: "tile (white background)"
  icon_per_tile: emoji or SVG (🤢·💩·🚨·🦋·🧿·📉)
  number_per_tile: "01-06 in tile__index"

safety_check:
  must_include_korean:
    - "메스꺼움"
    - "구토"
    - "췌장염"
    - "응급실"
    - "심한 복통"
  forbidden_terms:
    - "부작용 없음"
    - "안전 100%"
    - "임의 용량 증량"
  required_disclaimers:
    - "심한 복통 시 즉시 응급실 — 췌장염 가능"
    - "갑상선 가족력 (medullary 또는 MEN2) 시 사용 금기"
    - "임신·수유 시 회피"

inheritance:
  extends: null
  override_rule: 전체 6개 tile content 일괄 교체만 허용 (부분 X)

source_references:
  - FDA prescribing label (semaglutide·tirzepatide·liraglutide 2023-2024)
  - 대한당뇨병학회 (KDA) 2024 GLP-1 사용 가이드
  - SUSTAIN·LEADER·SURPASS trial safety analyses
  - PubMed pancreatitis association studies

audit:
  created: 2026-05-25
  authors: [정지환, claude-opus-4-7]
  reviewed_by: null
