block_id: glp1-storage-rules
version: v01
display_name: GLP-1 보관·운반 룰
description: |
  GLP-1 RA (semaglutide·tirzepatide·liraglutide) 자가 주사 약물의
  보관 온도·운반 시 주의·여행 시 가이드. 환자 교육 deck Slide 9-10에 표준 배치.
  냉장 보관·실온 보관 가능 기간·여행 시 보냉 가방 필요성을 명확히.

applies_to:
  - injections/glp-1
  - patient-education/medication-info

content:
  ko: |
    GLP-1 펜 보관·운반 룰

    🥶 미사용 펜 (개봉 전)
    - 냉장 보관 2-8°C 필수
    - 냉동 절대 금지 (얼면 폐기)
    - 직사광선 회피
    - 표시 사용 기한 (보통 24-36개월)

    🌡️ 사용 중 펜 (개봉 후)
    - 실온 (15-30°C) 또는 냉장 모두 가능
    - 개봉 후 6주 (semaglutide) / 56일 (tirzepatide) / 28일 (liraglutide) 사용
    - 30°C 초과 시 폐기
    - 직사광선 회피

    ✈️ 여행·이동 시
    - 비행기: 기내 휴대 (위탁 X — 화물칸 냉동 위험)
    - 처방전·약 라벨 동봉 (공항 보안)
    - 보냉 가방 + 아이스팩 (24시간 이상 외출 시)
    - 펜과 아이스팩 직접 접촉 금지 (얼음 → 동결 → 폐기)
    - 단시간 (≤30분) 실온 노출은 OK

    🚫 폐기 시점
    - 색 변화·혼탁 보임
    - 얼었던 펜
    - 사용 기한 초과
    - 개봉 후 위 기간 초과

  en: |
    GLP-1 pen storage and transport rules

    Unopened pens — refrigerate 2-8°C, never freeze (discard if frozen),
    avoid direct sunlight, use by labeled expiration (usually 24-36 months).

    In-use pens — room temperature 15-30°C OR refrigerated. Use within
    6 weeks (semaglutide) / 56 days (tirzepatide) / 28 days (liraglutide).
    Discard if exposed >30°C. Avoid direct sunlight.

    Travel — carry-on only (not checked baggage — freezing risk).
    Bring prescription and labeled pen for security. Use insulated bag
    with ice pack for >24h outings. Avoid direct contact between pen
    and ice pack (freezing → discard). Short room exposure (≤30 min) OK.

    Discard if — color change/cloudiness, previously frozen, expired,
    or beyond in-use window.

