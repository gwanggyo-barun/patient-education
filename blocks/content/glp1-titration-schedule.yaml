block_id: glp1-titration-schedule
version: v02
display_name: GLP-1 용량 점진 증량 (titration) 스케줄
description: |
  세마글루타이드(오젬픽·위고비)·티르제파타이드(맙젠다) 표준
  용량 증량 스케줄. 위장관 부작용 최소화를 위한 4주 단위 증량.
applies_to:
  - injections/glp-1

content:
  ko: |
    💊 GLP-1 용량 증량 — 4주 단위 점진 증량 (titration)

    🟦 세마글루타이드 (오젬픽 · 위고비)
    - 1-4주차:    0.25 mg / 주 1회 (시작)
    - 5-8주차:    0.5 mg
    - 9-12주차:   1.0 mg
    - 13-16주차:  1.7 mg (위고비 한정)
    - 17주차~:    2.4 mg (위고비 유지 용량)
    - 오젬픽 유지 용량: 1.0 mg 또는 2.0 mg

    🟩 티르제파타이드 (맙젠다)
    - 1-4주차:    2.5 mg / 주 1회
    - 5-8주차:    5 mg
    - 9-12주차:   7.5 mg
    - 13-16주차:  10 mg
    - 17-20주차:  12.5 mg
    - 21주차~:    15 mg (최대 유지)

    🟧 리라글루타이드 (삭센다 · 빅토자)
    - 매일 주사 (주 1회 X)
    - 1주차:    0.6 mg / 일
    - 2주차:    1.2 mg
    - 3주차:    1.8 mg
    - 4주차:    2.4 mg
    - 5주차~:   3.0 mg (삭센다 비만 적응증)

    ⚠️ 증량 원칙
    - 위장관 부작용(메스꺼움·구토·설사)이 심하면 한 단계 더 머무름
    - 임의로 두 단계 한 번에 증량 금지
    - 노인·신기능 저하·체중 적은 환자는 더 천천히 증량
    - 임신·췌장염 병력·갑상선 수질암 가족력은 의사와 상의

    💡 부작용 관리
    - 메스꺼움: 적은 양 자주 식사·기름진 음식 회피
    - 변비: 수분·식이섬유·운동 증가
    - 4-8주 내 대부분 호전

  html_template: |
    <section class="glp1-titration">
      <h2>💊 GLP-1 용량 증량 스케줄</h2>
      <table>
        <thead>
          <tr>
            <th>주차</th>
            <th>세마글루타이드<br/>(오젬픽·위고비)</th>
            <th>티르제파타이드<br/>(맙젠다)</th>
            <th>리라글루타이드<br/>(삭센다)</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>1-4주</td><td>0.25 mg</td><td>2.5 mg</td><td>0.6-2.4 mg/일</td></tr>
          <tr><td>5-8주</td><td>0.5 mg</td><td>5 mg</td><td>3.0 mg/일</td></tr>
          <tr><td>9-12주</td><td>1.0 mg</td><td>7.5 mg</td><td>유지</td></tr>
          <tr><td>13-16주</td><td>1.7 mg</td><td>10 mg</td><td>유지</td></tr>
          <tr><td>17주~</td><td>2.4 mg (위고비)</td><td>12.5-15 mg</td><td>유지</td></tr>
        </tbody>
      </table>
      <p class="glp1-titration__note">
        ⚠️ 부작용 심하면 한 단계 더 머무름 · 임의 2단계 증량 금지
      </p>
    </section>
  css: |
    .glp1-titration table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--gb-fs-body);
    }
    .glp1-titration th {
      background: var(--gb-navy);
      color: var(--gb-white);
      padding: 8px;
      text-align: left;
    }
    .glp1-titration td {
      padding: 8px;
      border-bottom: 1px solid var(--gb-border);
    }
    .glp1-titration tbody tr:nth-child(even) td {
      background: var(--gb-canvas-warm);
    }
    .glp1-titration__note {
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--gb-warning-bg);
      border-left: 3px solid var(--gb-warning);
      font-size: var(--gb-fs-body);
      color: var(--gb-ink);
    }

visual_constraints:
  required_columns:
    - 주차
    - 세마글루타이드
    - 티르제파타이드
    - 리라글루타이드
  must_show_units: true

safety_check:
  must_include_korean:
    - "titration"
    - "0.25 mg"
    - "주 1회"
    - "임의"
    - "부작용"
  forbidden_terms:
    - "한 번에 최대 용량"
    - "두 단계 한 번에 증량"
    - "임의로 더 빨리 증량"

source_references:
  - "Novo Nordisk Ozempic / Wegovy Prescribing Information 2024"
  - "Lilly Mounjaro Prescribing Information 2024"
  - "ADA Standards of Care 2024"

