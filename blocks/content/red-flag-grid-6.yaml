block_id: red-flag-grid-6
version: v02
display_name: 응급 증상 6가지 (red flag grid)
description: |
  환자 교육 자료에 들어가는 "병원 즉시 방문 필요한 증상"
  6가지 알람 타일. 3x2 grid, 진료 영역별 맞춤화 가능.
applies_to:
  - patient-education/*
  - endoscopy/post-procedure
  - injections/glp-1

content:
  html_template: |
    <section class="red-flags">
      <h2 class="red-flags__title">🆘 즉시 병원 방문이 필요한 증상</h2>
      <p class="red-flags__subtitle">한 가지라도 해당되면 지체 없이 응급실 또는 119</p>
      <div class="red-flags__grid">
        {% for flag in flags %}
        <div class="red-flags__tile">
          <div class="red-flags__icon">{{ flag.icon }}</div>
          <h3 class="red-flags__head">{{ flag.head }}</h3>
          <p class="red-flags__detail">{{ flag.detail }}</p>
        </div>
        {% endfor %}
      </div>
    </section>
  default_flags_yaml: |
    flags:
      - icon: "❤️"
        head: "가슴 통증·압박감"
        detail: "5분 이상 지속·식은땀 동반 — 심근경색 의심"
      - icon: "🧠"
        head: "한쪽 마비·말 어둔함"
        detail: "얼굴 비대칭·팔 떨어짐 — 뇌졸중 의심 (FAST)"
      - icon: "🫁"
        head: "갑작스런 호흡 곤란"
        detail: "안정 시에도 숨이 차고 가슴이 답답함"
      - icon: "🩸"
        head: "심한 출혈·검은 변"
        detail: "지혈되지 않는 출혈, 토혈, 흑색변"
      - icon: "🤒"
        head: "고열 + 의식 저하"
        detail: "39°C 이상 + 혼미·경련·심한 두통"
      - icon: "💊"
        head: "심한 알레르기 반응"
        detail: "얼굴·입술 부종, 전신 두드러기, 호흡 곤란"
  css: |
    .red-flags {
      padding: 24px 32px;
      background: var(--gb-danger-bg);
      border: 2px solid var(--gb-danger);
      border-radius: 12px;
    }
    .red-flags__title {
      font-size: var(--gb-fs-h2);
      color: var(--gb-danger);
      font-weight: var(--gb-fw-bold);
      margin-bottom: 4px;
    }
    .red-flags__subtitle {
      font-size: var(--gb-fs-body);
      color: var(--gb-ink-soft);
      margin-bottom: 16px;
    }
    .red-flags__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .red-flags__tile {
      background: var(--gb-white);
      border-left: 3px solid var(--gb-danger);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .red-flags__icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    .red-flags__head {
      font-size: var(--gb-fs-body-lg);
      color: var(--gb-danger);
      font-weight: var(--gb-fw-bold);
      margin: 0 0 4px 0;
    }
    .red-flags__detail {
      font-size: var(--gb-fs-caption);
      color: var(--gb-ink-soft);
      line-height: var(--gb-lh-snug);
      margin: 0;
    }

visual_constraints:
  tile_count: 6
  grid_columns: 3
  grid_rows: 2
  border: "2px solid #DC2626"
  background: "#FEF2F2"
  tile_border_left: "3px solid #DC2626"

safety_check:
  must_include_korean:
    - "응급실"
    - "119"
    - "지체 없이"
    - "병원"
  forbidden_terms:
    - "기다려 보세요"
    - "스스로 진단"
    - "응급실 안 가도"

source_references:
  - "American Heart Association 2024"
  - "대한심장학회 2024 · 대한뇌졸중학회 2024"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
