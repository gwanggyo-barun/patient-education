block_id: smoking-no-gum-warning
version: v01
display_name: 흡연·껌·사탕 금지 경고
description: |
  검사 전 금식 중 환자에게 흡연·껌·사탕·전자담배가
  위산·점막 자극으로 검사에 영향을 줌을 안내.
applies_to:
  - imaging/ultrasound/abdominal
  - endoscopy/pre-procedure

content:
  ko: |
    🚭 검사 전 — 흡연·껌·사탕 모두 금지

    왜 안 되나요?
    - 흡연: 위산 분비를 자극 → 위 내시경 시야 방해 + 진정 위험
    - 껌·사탕: 음식으로 분류 → 위·장 분비물 증가 → 검사 정확도 저하
    - 전자담배·니코틴 패치: 흡연과 동일한 위험
    - 일부 검사(예: 위내시경)에서는 흡연이 위 점막 색깔을 변화시켜
      병변 판독을 어렵게 함

    ⏰ 언제부터 금지하나요?
    - 음식과 같이 검사 8시간 전부터 모두 중단
    - 검사 당일에는 한 모금 흡입·한 알도 금지

    💡 평소 흡연자라면
    - 검사를 금연 시작 기회로 활용 — 의원 금연 클리닉 약물 처방 가능
    - 금단 증상이 심하면 미리 의료진과 상의

  html_template: |
    <section class="smoking-warning">
      <h2>🚭 흡연·껌·사탕 모두 금지</h2>
      <ul>
        <li><strong>흡연 (전자담배 포함)</strong> — 위산 자극·진정 위험</li>
        <li><strong>껌·사탕</strong> — 음식으로 분류 → 위 분비물 증가</li>
        <li><strong>니코틴 패치·갈음</strong> — 흡연과 동일하게 회피</li>
      </ul>
      <p class="smoking-warning__quit">
        💡 평소 흡연자라면 이번 검사를 금연 시작 기회로!
        의원 금연 클리닉 약물 처방 가능합니다.
      </p>
    </section>
  css: |
    .smoking-warning {
      background: var(--gb-warning-bg);
      border-left: 4px solid var(--gb-warning);
      border-radius: 8px;
      padding: 16px 20px;
    }
    .smoking-warning h2 {
      color: var(--gb-navy);
      font-weight: var(--gb-fw-bold);
      margin: 0 0 8px 0;
    }
    .smoking-warning ul {
      margin: 0;
      padding-left: 18px;
      font-size: var(--gb-fs-body);
      color: var(--gb-ink);
    }
    .smoking-warning__quit {
      margin: 10px 0 0 0;
      font-size: var(--gb-fs-caption);
      color: var(--gb-success);
      font-weight: var(--gb-fw-semibold);
    }

visual_constraints:
  border_left_color: "#F97316"
  background: "#FFF7ED"

safety_check:
  must_include_korean:
    - "흡연"
    - "껌"
    - "사탕"
    - "8시간"
    - "전자담배"
  forbidden_terms:
    - "흡연 OK"
    - "껌 OK"
    - "전자담배는 무관"

source_references:
  - "ASGE Pre-procedure Guideline 2023"
  - "대한금연학회 권고 2024"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
