block_id: anticoagulant-warning-noac
version: v02
display_name: DOAC (NOAC) 중단 시점 경고
description: |
  직접 작용 경구 항응고제 (DOAC / NOAC) — 리바록사반·아픽사반·
  다비가트란·에독사반 복용 환자의 시술 전 중단 시점 안내.
applies_to:
  - endoscopy/pre-procedure
  - endoscopy/biopsy
inheritance:
  parent: anticoagulant-warning-standard
  override_strategy: full-replace-content
  override_reason: DOAC 특화 중단 시점·신기능 보정 필요

content:
  ko: |
    💊 DOAC (NOAC) 복용 환자 — 시술 전 중단 시점
    - 출혈 저위험 시술 (단순 내시경, 진단 생검 X)
      · 시술 당일 아침 복용 생략 후 시술 → 시술 후 6시간 후 재개
    - 출혈 고위험 시술 (폴립 절제·EMR·ESD·점막하 박리)
      · 정상 신기능 (CrCl ≥ 50): 시술 48시간 전 중단
      · 신기능 저하 (CrCl 30-49): 시술 72시간 전 중단
      · 다비가트란은 신기능 의존도가 더 큼 → 더 길게 중단
    - 시술 후 재개: 지혈 확인 후 24-48시간 뒤 (출혈 위험에 따라)
    - 와파린과 달리 PT/INR 모니터링은 불필요
    - 반드시 처방 주치의(심장내과·신경과)와 상의
  en: |
    💊 Patients on DOACs (NOACs) — pre-procedure hold timing
    - Low bleeding risk procedure
      · Skip the morning dose → resume 6 h post-procedure
    - High bleeding risk procedure (polypectomy, EMR, ESD)
      · CrCl ≥ 50: hold 48 h before
      · CrCl 30–49: hold 72 h before
      · Dabigatran: longer hold per renal function
    - Resume 24–48 h after hemostasis confirmed
    - Coordinate with prescriber

visual_constraints:
  border: "4px solid #DC2626"
  border_radius: "12px"
  background: "#FEF2F2"
  padding: "16px 20px"
  icon: "💊"
  icon_color: "#DC2626"
  heading_color: "#7F1D1D"
  text_color: "#1c2025"
  table_header_bg: "#FECACA"

safety_check:
  must_include_korean:
    - "DOAC"
    - "24-48시간"
    - "주치의"
    - "신기능"
    - "출혈"
  forbidden_terms:
    - "INR 확인 필수"
    - "PT 매일 확인"
    - "5일 전"
    - "임의로 중단"
  required_disclaimers:
    - "처방 주치의와 상의"
    - "신기능 평가 필요"

source_references:
  - "ASGE Guideline on Antithrombotic Agents 2024"
  - "EHRA Practical Guide on NOAC 2024"
  - "대한심장학회 NOAC 사용 권고 2023"

