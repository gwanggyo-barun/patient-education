block_id: anticoagulant-warning-standard
version: v02
display_name: 항응고제 일반 경고 (시술 전)
description: |
  내시경·생검·시술 전 항응고제·항혈소판제 복용 환자에 대한
  일반 경고 블록. 약제별 구체 중단 시점은 별도 자식 블록 참조.
applies_to:
  - endoscopy/pre-procedure
  - endoscopy/biopsy
  - imaging/dxa
inheritance:
  parent: null
  child_blocks:
    - anticoagulant-warning-noac
    - anticoagulant-warning-warfarin

content:
  ko: |
    ⚠️ 항응고제·항혈소판제 복용 환자
    - 아래 약을 드시는 분은 검사 예약 시 반드시 알려주세요
      · 와파린 (쿠마딘)
      · DOAC: 리바록사반(자렐토)·아픽사반(엘리퀴스)·다비가트란(프라닥사)·에독사반(릭시아나)
      · 아스피린·클로피도그렐(플라빅스)·티카그렐러(브릴린타)
      · 실로스타졸(프레탈)
    - 임의로 약을 중단하지 마세요. 뇌졸중·심근경색 위험이 있습니다
    - 검사 종류·출혈 위험·환자 상태에 따라 중단 여부와 시점이 다릅니다
    - 반드시 처방 주치의(심장내과·신경과 등)와 상의 후 결정
  en: |
    ⚠️ Patients on anticoagulants / antiplatelets
    - Notify clinic at booking if you take any of:
      · Warfarin (Coumadin)
      · DOACs: rivaroxaban, apixaban, dabigatran, edoxaban
      · Aspirin, clopidogrel, ticagrelor
      · Cilostazol
    - Do NOT stop on your own — risk of stroke / MI
    - Hold timing depends on procedure bleeding risk
    - Consult the prescribing physician (cardiology / neurology)

visual_constraints:
  border: "4px solid #DC2626"
  border_radius: "12px"
  background: "#FEF2F2"
  padding: "16px 20px"
  icon: "💊"
  icon_color: "#DC2626"
  heading_color: "#7F1D1D"
  text_color: "#1c2025"
  list_marker_color: "#DC2626"

safety_check:
  must_include_korean:
    - "항응고제"
    - "주치의"
    - "출혈"
    - "임의로"
    - "와파린"
  forbidden_terms:
    - "검사 전날 아무 약이나 중단해도 OK"
    - "임의로 중단해도 됩니다"
    - "주치의 상의 필요 없음"
  required_disclaimers:
    - "처방 주치의와 상의"
    - "임의 중단 금지"

source_references:
  - "ASGE Guideline on Antithrombotic Agents 2024"
  - "대한심장학회 항혈전제 관리 권고 2023"

