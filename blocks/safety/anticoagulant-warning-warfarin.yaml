block_id: anticoagulant-warning-warfarin
version: v02
display_name: 와파린 중단 시점 경고
description: |
  와파린(쿠마딘) 복용 환자의 시술 전 중단 시점·bridging 안내.
  INR 모니터링과 헤파린 가교 요법 가능성 포함.
applies_to:
  - endoscopy/pre-procedure
  - endoscopy/biopsy
inheritance:
  parent: anticoagulant-warning-standard
  override_strategy: full-replace-content
  override_reason: 와파린 5일 중단·INR 확인·고위험 환자 bridging 필요

content:
  ko: |
    💊 와파린 (쿠마딘) 복용 환자 — 시술 전 중단·복귀
    - 출혈 저위험 시술 (단순 내시경)
      · 일반적으로 중단 불필요. 단, INR이 치료 범위(2-3) 내인지 확인
    - 출혈 고위험 시술 (폴립 절제·EMR·ESD)
      · 시술 5일 전 와파린 중단
      · 시술 전날 INR 측정 → 1.5 이하 확인
      · 시술 당일 INR ≤ 1.5 이면 진행
      · 시술 후 출혈 위험 가라앉으면 당일 저녁 또는 다음 날 재개
    - 혈전 고위험군 (기계 판막·최근 색전증·심방세동 CHA₂DS₂-VASc ≥ 5)
      · 저분자량 헤파린 bridging 필요 — 입원·전문 관리
    - 반드시 처방 주치의(심장내과·신경과)와 상의 후 결정
    - 자가 중단 시 뇌졸중·심근경색 위험
  en: |
    💊 Warfarin — pre-procedure hold and resumption
    - Low bleeding risk: usually continue, confirm INR 2–3
    - High bleeding risk: stop 5 days before, INR ≤1.5 day of procedure
    - High thrombotic risk (mechanical valve, recent VTE, AF with CHA₂DS₂-VASc ≥5): LMWH bridging required
    - Resume the evening of or day after procedure
    - Coordinate with prescriber — do not stop on your own

