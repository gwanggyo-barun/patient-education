    - "5일 전"
    - "INR"
    - "주치의"
    - "bridging"
  forbidden_terms:
    - "검사 당일까지 복용"
    - "INR 확인 불필요"
    - "임의로 중단"
    - "24-48시간 전"
  required_disclaimers:
    - "처방 주치의와 상의"
    - "INR 1.5 이하 확인 필수"

