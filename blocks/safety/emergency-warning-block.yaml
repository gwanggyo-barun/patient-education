block_id: emergency-warning-block
version: v02
display_name: 응급 증상 즉시 연락 안내
description: |
  시술 후·약물 복용 중·만성질환 환자에게 적용되는 표준
  응급 증상 6가지 + 119 연락 안내 블록.
applies_to:
  - endoscopy/post-procedure
  - patient-education/chronic-disease
  - patient-education/medication-info
  - injections/glp-1

content:
  ko: |
    🆘 즉시 119 또는 응급실 — 다음 증상이 나타나면 지체 없이
    - 가슴 통증·압박감·호흡 곤란 (심근경색·폐색전증 의심)
    - 의식 저하·말 어둔함·한쪽 마비 (뇌졸중 의심)
    - 심한 복통·검은 변·토혈 (소화기 출혈 의심)
    - 39°C 이상 고열 + 오한
    - 심한 알레르기 반응 (얼굴 부종·전신 두드러기·호흡 곤란)
    - 검사·시술 부위 지속 출혈 또는 부종

    📞 광교바른내과 직통 (진료 시간 내)
    031-893-4560 (월-금 08:30-18:30 · 토 08:30-13:30)
    📞 야간·휴일: 119 또는 가까운 응급실 (아주대학교병원 응급실 1577-7300)
  en: |
    🆘 Call 119 / ER IMMEDIATELY for:
    - Chest pain / pressure / dyspnea (MI / PE)
    - Altered consciousness / slurred speech / one-sided weakness (stroke)
    - Severe abdominal pain / black stool / hematemesis (GI bleed)
    - Fever ≥39°C with chills
    - Severe allergic reaction (facial swelling, urticaria, dyspnea)
    - Persistent bleeding or swelling at procedure site

    📞 Clinic direct (business hours): 031-893-4560
    📞 After hours: 119 or nearest ER

visual_constraints:
  border: "4px solid #B91C1C"
  border_radius: "12px"
  background: "#FEE2E2"
  padding: "16px 20px"
  icon: "🆘"
  icon_color: "#7F1D1D"
  heading_color: "#7F1D1D"
  heading_size: "18pt"
  text_color: "#1c2025"
  phone_number_color: "#B91C1C"
  phone_number_weight: 800

safety_check:
  must_include_korean:
    - "119"
    - "응급"
    - "가슴 통증"
    - "뇌졸중"
    - "출혈"
    - "031-893-4560"
  forbidden_terms:
    - "스스로 진단"
    - "응급실 굳이 안 가도"
    - "기다려 보세요"
  required_disclaimers:
    - "응급 시 119 즉시 연락"

source_references:
  - "American Heart Association 2024 — Stroke Warning Signs"
  - "대한심장학회 급성관상동맥증후군 진료지침 2024"

