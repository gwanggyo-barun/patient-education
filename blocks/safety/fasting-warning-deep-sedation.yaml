block_id: fasting-warning-deep-sedation
version: v02
display_name: 깊은 진정 금식 경고 (12시간)
description: |
  대장내시경·심장 시술 등 깊은 진정 (propofol·midazolam high dose)
  검사에서 사용하는 12시간 금식 안내 블록.
applies_to:
  - endoscopy/pre-procedure
  - endoscopy/procedure-day
inheritance:
  parent: fasting-warning-standard
  override_strategy: full-replace-content
  override_reason: 깊은 진정 시 흡인성 폐렴 위험으로 금식 시간 강화

content:
  ko: |
    ⚠️ 검사 전 깊은 진정 — 12시간 완전 금식 필수
    - 검사 전날 저녁 9시 이후 음식·음료 모두 중단
    - 맑은 물(투명 액체)만 검사 2시간 전까지 소량 가능
    - 우유·주스·요거트·미음·식혜는 금지 (음식으로 분류)
    - 껌·사탕·담배 모두 금지
    - 임의로 약을 중단하지 마세요. 복용약은 주치의와 상의
    - 검사 후 24시간 운전·기계 조작·중요 결정 금지
    - 보호자 동반 필수 (단독 귀가 불가)
  en: |
    ⚠️ Deep sedation — 12-hour strict fasting required
    - Stop all food / beverages after 9 PM the night before
    - Only clear water in small sips, up to 2 hours before
    - No milk, juice, yogurt, rice porridge, sikhye (treated as food)
    - No gum, candy, or smoking
    - Do not stop routine medications on your own
    - No driving / operating machinery / major decisions for 24 hours
    - Mandatory caregiver accompaniment

visual_constraints:
  border: "4px solid #DC2626"
  border_radius: "12px"
  background: "#FEF2F2"
  padding: "16px 20px"
  icon: "🚨"
  icon_color: "#DC2626"
  heading_color: "#7F1D1D"
  text_color: "#1c2025"
  font_weight_heading: 800
  emphasis_style: "underline solid 2px #DC2626"

safety_check:
  must_include_korean:
    - "12시간"
    - "금식"
    - "보호자"
    - "운전"
    - "24시간"
    - "맑은 물"
  forbidden_terms:
    - "8시간"
    - "혼자 귀가"
    - "단독 귀가"
    - "운전 가능"
    - "우유 OK"
    - "음식 약간 OK"
  required_disclaimers:
    - "주치의와 약 복용 상의"
    - "보호자 동반 필수"

source_references:
  - "대한소화기내시경학회 진정내시경 가이드라인 2024"
  - "ASA Fasting Guideline 2023 (deep sedation)"

