block_id: fasting-warning-standard
version: v02
display_name: 일반 금식 경고 (8시간)
description: |
  위내시경·복부초음파 등 일반 진정 또는 비진정 검사에서
  사용하는 표준 금식 안내 블록 (8시간 기준).
applies_to:
  - endoscopy/pre-procedure
  - imaging/ultrasound/abdominal
  - imaging/ct
inheritance:
  parent: null
  child_blocks:
    - fasting-warning-deep-sedation

content:
  ko: |
    ⚠️ 검사 8시간 전부터 금식해 주세요
    - 물 한 모금까지 가능 (검사 2시간 전까지)
    - 껌·사탕·담배 모두 금지
    - 평소 복용 약은 의사 지시에 따라 소량의 물과 함께 복용 가능
    - 임의로 약을 중단하지 마세요
    - 당뇨 환자는 인슐린·경구약 용량을 반드시 주치의와 상의
  en: |
    ⚠️ Fast for 8 hours before the procedure
    - Sips of clear water OK up to 2 hours before
    - No gum, candy, or smoking
    - Take routine medications with a sip of water per physician's instructions
    - Do not stop medications on your own
    - Diabetic patients: consult physician regarding insulin / oral hypoglycemic dose

visual_constraints:
  border: "4px solid #F97316"
  border_radius: "12px"
  background: "#FFF7ED"
  padding: "16px 20px"
  icon: "⚠️"
  icon_color: "#F97316"
  heading_color: "#9A3412"
  text_color: "#1c2025"
  font_weight_heading: 700
  font_weight_body: 450

safety_check:
  must_include_korean:
    - "8시간"
    - "금식"
    - "물 한 모금"
    - "껌"
    - "주치의"
  forbidden_terms:
    - "12시간"
    - "물 절대 금지"
    - "임의로 약 중단"
    - "약 중단해도 됩니다"
  required_disclaimers:
    - "당뇨 환자는 주치의와 상의"

source_references:
  - "대한소화기내시경학회 진정내시경 가이드라인 2024"
  - "ASGE Guideline on Sedation 2023"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
