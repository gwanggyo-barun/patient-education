block_id: lactation-caution
version: v01
display_name: 수유 중 주의 안내
description: |
  수유 중 환자 대상 약물·진정·조영제 사용 시 주의사항 안내.
  유급 펌핑(pump and dump) 권고 시점 포함.
applies_to:
  - patient-education/medication-info
  - imaging/ct
  - endoscopy/pre-procedure

content:
  ko: |
    🤱 수유 중 환자 — 약물·시술 전 확인
    - 수유 중이라면 처방·시술 전 반드시 의료진에게 알려주세요
    - 대부분의 약물은 모유로 소량 이행하지만 일부는 주의 필요
    - 시술·검사별 권고
      · 진정내시경: 진정제 효과 가라앉은 후 (보통 6-12시간) 수유 재개
      · CT 조영제 (요오드): 수유 지속 가능 (이행량 미미)
      · MRI 가돌리늄 조영제: 수유 지속 가능 (최신 가이드라인)
    - 일시 중단·펌프 후 폐기(pump and dump)가 필요한 약물
      · 일부 항암제·방사성 동위원소·고용량 진정제
    - 모유 수유 OK 약물
      · 아세트아미노펜·이부프로펜 (단기)
      · 페니실린 계열·세팔로스포린
      · 대부분의 백신 (생백신 일부 예외)
    - LactMed (NIH) 데이터베이스 참고 권고
  en: |
    🤱 Lactating patients — review before medication / procedure
    - Notify clinician about breastfeeding status
    - Most medications transfer minimally; some require caution
    - Sedation endoscopy: resume nursing 6–12 h after sedation
    - CT iodinated contrast: continue nursing (minimal transfer)
    - MRI gadolinium contrast: continue nursing (current guidelines)
    - Pump-and-dump indicated for some chemotherapeutics, radioisotopes
    - Generally safe: acetaminophen, ibuprofen (short term), most antibiotics, most vaccines
    - Reference: LactMed (NIH) database

visual_constraints:
  border: "3px solid #F59E0B"
  border_radius: "12px"
  background: "#FFFBEB"
  padding: "16px 20px"
  icon: "🤱"
  icon_color: "#D97706"
  heading_color: "#92400E"
  text_color: "#1c2025"

safety_check:
  must_include_korean:
    - "수유"
    - "의료진"
    - "모유"
    - "6-12시간"
  forbidden_terms:
    - "수유 중에는 모든 약 금지"
    - "조영제는 무조건 수유 중단"
    - "임의로 단유"
  required_disclaimers:
    - "처방 의료진과 상의"

source_references:
  - "AAP Clinical Report: Drugs in Breast Milk 2024"
  - "ACR Manual on Contrast Media v2024"
  - "LactMed (NIH) 2024"

