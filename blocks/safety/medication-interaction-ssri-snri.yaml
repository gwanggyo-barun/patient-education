block_id: medication-interaction-ssri-snri
version: v01
display_name: SSRI/SNRI 약물 상호작용 경고
description: |
  SSRI·SNRI 복용 환자에 대한 주요 약물 상호작용 (출혈 위험·
  세로토닌 증후군·NSAID 병용·MAOI 금기) 경고 블록.
applies_to:
  - patient-education/medication-info
  - endoscopy/pre-procedure

content:
  ko: |
    💊 SSRI · SNRI 복용 환자 — 약물 상호작용 주의

    📌 출혈 위험 증가 (혈소판 기능 감소)
    - NSAID (이부프로펜·나프록센·아스피린) 병용 시 위장관 출혈 ↑
    - 항응고제·항혈소판제와 병용 시 출혈 위험 추가 증가
    - 시술·발치·내시경 전 의료진에게 알리세요

    ⚠️ 세로토닌 증후군 위험
    - 트라마돌·메페리딘·덱스트로메토르판·린졸리드 병용 금지
    - 트립탄 (편두통약)·5-HT3 차단제 (온단세트론) 신중 사용
    - 증상: 발열·근육 강직·혼란·발한·심박수 증가

    🚫 절대 금기
    - MAOI (선택적·비선택적 모두) — 14일 휴약 필수
    - 메칠렌블루 정주 — 세로토닌 증후군 위험

    📌 자가 중단 위험
    - 임의 중단 시 금단 증상 (어지러움·불안·전기 같은 감각) 가능
    - 반드시 처방 정신과·내과 의사와 상의 후 점진적 감량
  en: |
    💊 SSRI / SNRI — major interactions
    - Bleeding risk increased with NSAIDs / anticoagulants / antiplatelets
    - Serotonin syndrome risk with tramadol, meperidine, dextromethorphan, linezolid
    - Cautious use with triptans, ondansetron
    - Absolute contraindication: MAOI (14-day washout)
    - Do not stop abruptly — risk of discontinuation syndrome

