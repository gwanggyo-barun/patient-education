block_id: pregnancy-x-warning
version: v01
display_name: 임신 금기 경고 (Category X 또는 방사선)
description: |
  임신 가능 여성 (15-50세) 대상 시술·약물·방사선 검사 전
  임신 가능성 확인 의무 안내.
applies_to:
  - imaging/ct
  - imaging/xray
  - imaging/dxa
  - endoscopy/pre-procedure
  - patient-education/medication-info

content:
  ko: |
    ⚠️ 가임기 여성 (15-50세) — 임신 여부 확인 필수
    - 검사·시술·약물 처방 전 마지막 생리일을 확인해 주세요
    - 임신 가능성이 있다면 검사 전 반드시 의료진에게 알려주세요
    - 방사선 검사 (CT·X-ray·DXA)는 임신 중 가급적 회피
      · 부득이한 경우 복부 차폐 + 최소 선량으로 시행
    - 다음 약물은 임신 중 금기 (Category X)
      · 와파린 (Coumadin) — 첫 3개월 기형 위험
      · 이소트레티노인 (여드름약) — 심한 기형 위험
      · 메토트렉세이트 — 유산·기형 위험
      · 스타틴 — 임신 중 중단 권고
    - 임신 가능성이 의심되면 시술 전 소변 임신 검사를 시행할 수 있습니다
    - 수유 중인 경우도 별도 안내가 필요합니다
  en: |
    ⚠️ Women of childbearing age (15–50) — confirm pregnancy status
    - Last menstrual period must be reviewed before procedure / medication
    - Notify staff if pregnancy is possible
    - Radiologic exams (CT / X-ray / DXA): avoid in pregnancy when possible
    - Category X drugs (avoid in pregnancy):
      · Warfarin · Isotretinoin · Methotrexate · Statins
    - Urine pregnancy test may be performed before procedure
    - Lactating patients: separate guidance required

visual_constraints:
  border: "4px solid #EC4899"
  border_radius: "12px"
  background: "#FDF2F8"
  padding: "16px 20px"
  icon: "🤰"
  icon_color: "#EC4899"
  heading_color: "#9D174D"
  text_color: "#1c2025"

safety_check:
  must_include_korean:
    - "임신"
    - "가임기"
    - "마지막 생리"
    - "의료진"
    - "차폐"
  forbidden_terms:
    - "임신 중에도 안전"
    - "방사선 무관"
    - "약물 자가 판단 OK"
  required_disclaimers:
    - "임신 가능성 시 즉시 알림"
    - "수유 중 별도 상담"

source_references:
  - "FDA Pregnancy and Lactation Labeling Rule 2024"
  - "ACR Guidance on Imaging in Pregnancy 2023"
  - "대한산부인과학회 임신 중 약물 안전성 권고 2024"

