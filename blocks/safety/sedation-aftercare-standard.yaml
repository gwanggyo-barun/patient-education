block_id: sedation-aftercare-standard
version: v02
display_name: 진정 후 24시간 회복 안내
description: |
  진정내시경·시술 후 환자에게 24시간 운전·기계 조작·중요 결정
  금지를 안내하는 표준 블록.
applies_to:
  - endoscopy/post-procedure
  - imaging/ct
  - endoscopy/procedure-day

content:
  ko: |
    🚫 진정 후 24시간 — 절대 금지 사항
    - 운전 금지 (자동차·오토바이·자전거 모두)
    - 기계·도구 조작 금지 (조리·작업장 기계 포함)
    - 중요 결정 금지 (계약 서명·금융 거래·중요 회의)
    - 음주 금지 (진정제와 상호작용으로 호흡 억제)
    - 보호자 동반 귀가 필수 — 단독 귀가 불가
    - 24시간 동안 어린이·환자 단독 돌봄 금지
    - 정상 식사 복귀는 메스꺼움 없을 때 가벼운 음식부터
    - 어지러움·졸림·구역감은 6-12시간 정도 지속 가능 (정상)

    🆘 즉시 병원 연락이 필요한 증상
    - 가슴 통증·호흡곤란
    - 39°C 이상 발열
    - 검사 부위 지속 출혈
    - 의식 저하·심한 어지러움
  en: |
    🚫 24-hour post-sedation restrictions
    - No driving (cars, motorcycles, bicycles)
    - No operating machinery or tools
    - No important decisions (contracts, financial transactions)
    - No alcohol (respiratory depression risk)
    - Caregiver-accompanied discharge required
    - No solo childcare or patient caregiving for 24 hours
    - Resume diet gradually starting with bland foods
    - Mild drowsiness 6–12 h is normal

    🆘 Call clinic immediately if:
    - Chest pain or shortness of breath
    - Fever ≥39°C
    - Persistent bleeding
    - Severe dizziness or altered consciousness

visual_constraints:
  border: "4px solid #DC2626"
  border_radius: "12px"
  background: "#FEF2F2"
  padding: "16px 20px"
  icon: "🚫"
  icon_color: "#DC2626"
  heading_color: "#7F1D1D"
  text_color: "#1c2025"
  emergency_section_border: "2px solid #B91C1C"
  emergency_section_bg: "#FEE2E2"

safety_check:
  must_include_korean:
    - "24시간"
    - "운전 금지"
    - "보호자"
    - "음주 금지"
    - "기계"
    - "응급"
  forbidden_terms:
    - "운전 가능"
    - "단독 귀가 OK"
    - "혼자 귀가"
    - "음주 가능"
  required_disclaimers:
    - "응급 증상 시 즉시 연락"

source_references:
  - "ASGE Guideline on Sedation 2023"
  - "대한소화기내시경학회 진정내시경 가이드라인 2024"

