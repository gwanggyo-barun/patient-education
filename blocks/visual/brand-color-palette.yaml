block_id: brand-color-palette
version: v02
display_name: 광교바른내과 브랜드 색상 팔레트
description: |
  광교바른내과 표준 색상 토큰. CSS variable 형태로 모든 deck·
  handout·lab-report에 inject. Navy(#003366) + Steel Blue(#5B9BD5)
  primary, neutral 7단계, accent 3종.
applies_to:
  - "*"

content:
  css: |
    :root {
      /* Primary — 광교바른내과 시그니처 */
      --gb-navy: #003366;
      --gb-navy-dark: #001f44;
      --gb-navy-soft: #1A4D80;
      --gb-steel-blue: #5B9BD5;
      --gb-steel-blue-soft: #8FB8DD;
      --gb-steel-blue-light: #E3EDF7;

      /* Neutral */
      --gb-white: #FFFFFF;
      --gb-canvas-warm: #FAF7F2;
      --gb-light-gray: #F4F6F8;
      --gb-border: #E5E8EB;
      --gb-muted: #8B95A1;
      --gb-ink-soft: #4E5968;
      --gb-ink: #1C2025;

      /* Accent — 의료 안전성 */
      --gb-success: #15803D;
      --gb-success-bg: #DCFCE7;
      --gb-warning: #F97316;
      --gb-warning-bg: #FFF7ED;
      --gb-danger: #DC2626;
      --gb-danger-bg: #FEF2F2;
      --gb-info: #0891B2;
      --gb-info-bg: #E0F2FE;

      /* Highlight */
      --gb-pink-warning: #EC4899;
      --gb-pink-bg: #FDF2F8;
      --gb-amber-warning: #F59E0B;
      --gb-amber-bg: #FFFBEB;
    }

  ko_usage_guide: |
    🎨 사용 가이드
    - 본문 텍스트: --gb-ink (#1C2025)
    - 헤딩·제목·로고: --gb-navy (#003366)
    - 강조·하이라이트: --gb-steel-blue (#5B9BD5)
    - 캡션·보조 텍스트: --gb-ink-soft (#4E5968)
    - 위험 경고: --gb-danger (#DC2626) + bg --gb-danger-bg
    - 주의 경고: --gb-warning (#F97316) + bg --gb-warning-bg
    - 임신 경고: --gb-pink-warning (#EC4899) + bg --gb-pink-bg
    - 정상·성공: --gb-success (#15803D)

visual_constraints:
  reserved_hex:
    - "#FF0000"   # 순빨강 — 사용 금지
    - "#0000FF"   # 순파랑 — 사용 금지
    - "#00FF00"   # 순녹색 — 사용 금지
  min_contrast_ratio: 4.5
  contrast_check_pairs:
    - ["#003366", "#FFFFFF", "expected ≥ 12:1"]
    - ["#5B9BD5", "#FFFFFF", "expected ≥ 3.5:1"]
    - ["#1C2025", "#FAF7F2", "expected ≥ 14:1"]
    - ["#DC2626", "#FEF2F2", "expected ≥ 5:1"]

safety_check:
  forbidden_terms:
    - "color: red"
    - "background: red"
    - "#FF0000"
    - "#0000FF"
  must_include_korean: []

source_references:
  - "광교바른내과 Brand Design System 2026 v1"
  - "reference/brand-design-system.md"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
