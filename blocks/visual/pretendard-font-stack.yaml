block_id: pretendard-font-stack
version: v02
display_name: Pretendard Variable 폰트 스택
description: |
  광교바른내과 표준 폰트 — Pretendard Variable.
  CDN 로드 + font-family stack + weight scale + size scale.
applies_to:
  - "*"

content:
  html_head: |
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  css: |
    :root {
      --gb-font-primary:
        "Pretendard Variable", Pretendard,
        -apple-system, BlinkMacSystemFont,
        system-ui, "Apple SD Gothic Neo",
        "Noto Sans KR", "Malgun Gothic", sans-serif;
      --gb-font-mono:
        "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;

      /* Weight scale (Pretendard Variable) */
      --gb-fw-regular: 450;
      --gb-fw-medium: 540;
      --gb-fw-semibold: 620;
      --gb-fw-bold: 700;
      --gb-fw-black: 900;

      /* Screen size scale (deck / web) */
      --gb-fs-h1: 32px;
      --gb-fs-h2: 24px;
      --gb-fs-h3: 18px;
      --gb-fs-body-lg: 16px;
      --gb-fs-body: 14px;
      --gb-fs-caption: 11px;

      /* Print size scale (handout / lab-report) */
      --gb-fs-print-h1: 24pt;
      --gb-fs-print-h2: 18pt;
      --gb-fs-print-h3: 14pt;
      --gb-fs-print-body-lg: 13pt;
      --gb-fs-print-body: 12pt;
      --gb-fs-print-caption: 9pt;

      /* Letter spacing */
      --gb-ls-mega: -0.04em;
      --gb-ls-tight: -0.02em;
      --gb-ls-snug: -0.01em;
      --gb-ls-normal: 0;

      /* Line height */
      --gb-lh-tight: 1.2;
      --gb-lh-snug: 1.4;
      --gb-lh-normal: 1.55;
      --gb-lh-relaxed: 1.7;
    }
    body, html {
      font-family: var(--gb-font-primary);
      font-weight: var(--gb-fw-regular);
      letter-spacing: var(--gb-ls-snug);
      line-height: var(--gb-lh-normal);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss01", "ss02", "tnum";
    }

visual_constraints:
  required_cdn_host: "cdn.jsdelivr.net"
  required_font_file: "pretendardvariable.min.css"
  fallback_strategy: system-korean-sans
  forbidden_fonts:
    - "Times New Roman"
    - "Courier"
    - "Arial Narrow"
    - "Comic Sans"

safety_check:
  must_include_korean: []
  forbidden_terms:
    - "font-family: Times"
    - "font-family: Arial"
    - "font-family: serif"

source_references:
  - "Pretendard Variable 1.3.9 — orioncactus/pretendard"
  - "광교바른내과 Brand Design System v1"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
