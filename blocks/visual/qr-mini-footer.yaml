block_id: qr-mini-footer
version: v02
display_name: QR mini 푸터 (A4 handout)
description: |
  A4 handout · lab-report의 footer 우측에 24mm 크기로
  들어가는 미니 QR 코드. 모바일에서 자료 URL 열기용.
applies_to:
  - handouts/*
  - lab-reports/*

content:
  html_template: |
    <div class="qr-mini">
      <div class="qr-mini__code"
           data-url="{{ handout_canonical_url }}"
           data-size="24mm"></div>
      <div class="qr-mini__text">
        <span class="qr-mini__label">모바일에서 보기</span>
        <span class="qr-mini__clinic">광교바른내과 · 031-217-5878</span>
      </div>
    </div>
  css: |
    .qr-mini {
      position: absolute;
      bottom: 14mm;
      right: 14mm;
      display: flex;
      gap: 6mm;
      align-items: center;
    }
    .qr-mini__code {
      width: 24mm;
      height: 24mm;
      padding: 1.5mm;
      background: #FFFFFF;
      border: 1px solid var(--gb-navy);
      border-radius: 2mm;
    }
    .qr-mini__text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .qr-mini__label {
      font-size: 8pt;
      color: var(--gb-ink-soft);
      font-weight: var(--gb-fw-medium);
    }
    .qr-mini__clinic {
      font-size: 8pt;
      color: var(--gb-navy);
      font-weight: var(--gb-fw-bold);
      letter-spacing: var(--gb-ls-tight);
    }

visual_constraints:
  qr_size_mm: 24
  qr_padding_mm: 1.5
  qr_border_color: "#003366"
  qr_color: navy-003366
  qr_background: "#FFFFFF"
  position: footer-right
  bottom_margin_mm: 14
  right_margin_mm: 14
  must_not_overlap_with: ["body-content", "ownership-mark"]
  error_correction_level: M

safety_check:
  must_include_korean:
    - "광교바른내과"
    - "031-217-5878"
  forbidden_terms: []

source_references:
  - "광교바른내과 Brand Design System v1"

audit:
  created_at: 2026-05-25T09:00:00+09:00
  reviewed_by: 정지환
  next_review_due: 2026-11-25
