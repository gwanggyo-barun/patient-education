brand_id: gwanggyo-bareun-print-v1
display_name: 광교바른내과 (Print 변형)
inherits: gwanggyo-bareun-v1
version: v1
effective_date: 2026-01-01

purpose: |
  A4 핸드아웃·검사 결과지·인쇄용 자료 전용 브랜드 프로필.
  300 DPI 인쇄 품질 + 컬러 정확도 + 가독성 우선.

overrides:
  typography:
    scale:
      body: 12pt
      body_lg: 13pt
      caption: 9pt
      h3: 14pt
      h2: 18pt
      h1: 24pt
  radius:
    lg: 12px
  accessibility:
    min_font_size_print_pt: 10
  illustration_style:
    min_dpi: 300
    color_mode: cmyk-aware
  shadows: minimal-only

print_specific:
  paper_size: A4
  paper_dimensions: 210mm × 297mm
  page_padding: 14mm
  body_max_width: 182mm
  body_2col_width: 88mm
  body_3col_width: 58mm
  bleed: 0
  safe_zone: 5mm
  font_smoothing: antialiased
  ink_save_mode: false

qr_block:
  type: qr-mini__code
  size: 24mm
  position: footer-right
  color: navy-003366
  background: white

ownership_mark:
  enabled: true
  text_kr: "© 2026 광교바른내과 · 무단 수정/재배포 금지"
  text_en: "© 2026 Gwanggyo Bareun Internal Medicine · No unauthorized redistribution"
  font_size: 8pt
  opacity: 0.30
  position: footer-center
