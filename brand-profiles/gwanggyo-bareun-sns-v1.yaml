brand_id: gwanggyo-bareun-sns-v1
display_name: 광교바른내과 (SNS 카드 변형)
inherits: gwanggyo-bareun-v1
version: v1
effective_date: 2026-01-01

purpose: |
  Instagram 카드 · 카카오 채널 · 페이스북 공유용.
  1:1 비율 + 모바일 첫 노출 + 강한 시각 대비.

overrides:
  palette:
    primary:
      navy: "#001f44"
      steel_blue: "#4A8FCF"
  typography:
    scale:
      h1: 64px
      h2: 48px
      h3: 32px
      body: 22px
      body_lg: 26px
  shadows: bold-with-elevation

sns_specific:
  formats:
    square_1080:
      width: 1080
      height: 1080
    portrait_1080:
      width: 1080
      height: 1350
    story:
      width: 1080
      height: 1920
  font_smoothing: antialiased
  emoji_allowed: true
  emoji_max_per_card: 3

content_rules:
  text_min_size: 22px
  text_density: low
  call_to_action: required
  hashtag_korean: ["#광교바른내과", "#광교내과", "#환자교육", "#의학정보"]
  hashtag_english: ["#gwanggyobareun", "#patienteducation", "#medicalinfo"]

qr_block:
  enabled: false
  alt: url-text-only

ownership_mark:
  enabled: true
  text: "© 광교바른내과"
  font_size: 14px
  opacity: 0.60
  position: bottom-right-corner

restrictions:
  - no_patient_data
  - no_phi
  - no_unverified_claims
  - moderate_clinical_warnings
