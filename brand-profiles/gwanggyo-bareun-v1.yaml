brand_id: gwanggyo-bareun-v1
display_name: 광교바른내과 (Gwanggyo Bareun Internal Medicine)
version: v1
effective_date: 2026-01-01

palette:
  primary:
    navy: "#003366"
    steel_blue: "#5B9BD5"
  neutral:
    white: "#FFFFFF"
    light_gray: "#F4F6F8"
    canvas_warm: "#FAF7F2"
    border: "#E5E8EB"
    ink: "#1c2025"
    ink_soft: "#4e5968"
    muted: "#8b95a1"
  accent:
    success: "#15803D"
    warning: "#F97316"
    danger: "#EF4444"
  reserved_no_use:
    - "#FF0000"
    - "#0000FF"
    - "#FF00FF"

typography:
  primary: Pretendard Variable
  cdn: "https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
  weights:
    regular: 450
    medium: 540
    bold: 700
    black: 900
  scale:
    h1: 32px
    h2: 24px
    h3: 18px
    body: 14px
    body_lg: 16px
    caption: 11px
  letter_spacing:
    tight: -0.02em
    snug: -0.01em
    normal: 0
    mega: -0.04em

spacing:
  base_unit: 4px
  scale: [0, 4, 8, 12, 16, 24, 32, 48, 64, 80, 120]

radius:
  none: 0
  sm: 4px
  md: 8px
  lg: 16px
  pill: 9999px

illustration_style:
  type: flat-medical
  preferred_format: vector
  no_3d: true
  no_skeuomorphism: true
  background: white-with-soft-gradient
  shadows: soft-only
  required_constraints:
    - no_text_inside_image
    - aspect_ratio_strict_measured

icon_style:
  set: lucide-or-custom-svg
  stroke_width: 2px
  size_scale: [16, 20, 24, 32, 48]
  color_inherit: true

accessibility:
  min_contrast_ratio: 4.5
  min_font_size_print_pt: 10
  min_font_size_screen_px: 13
  alt_text_required: true
  korean_pretendard_fallback: "-apple-system, BlinkMacSystemFont, sans-serif"

variants_index:
  - gwanggyo-bareun-print-v1
  - gwanggyo-bareun-web-v1
  - gwanggyo-bareun-sns-v1
