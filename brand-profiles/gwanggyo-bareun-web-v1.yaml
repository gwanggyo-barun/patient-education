brand_id: gwanggyo-bareun-web-v1
display_name: 광교바른내과 (Web/Deck 변형)
inherits: gwanggyo-bareun-v1
version: v1
effective_date: 2026-01-01

purpose: |
  16:9 슬라이드 deck · 웹 embed · 클리닉 허브 노션 임베드용.
  화면 가독성 + 발표용 큰 폰트 + 시각 강조 우선.

overrides:
  typography:
    scale:
      h1: 48px
      h2: 36px
      h3: 24px
      body: 16px
      body_lg: 18px
      caption: 13px
  shadows: soft-with-elevation
  accessibility:
    min_font_size_screen_px: 14
  illustration_style:
    min_dpi: 144

web_specific:
  viewport: deck-16x9
  viewport_dimensions: 1280×720
  body_max_width: 1120px
  body_2col_width: 536px
  font_smoothing: subpixel-antialiased
  responsive: false
  print_friendly: false

deck_structure:
  standard_slide_count: 12
  slide_master_grid: [header, title-block, body, footer]
  required_patterns:
    - cover
    - tldr-or-hero-stat
    - closing-with-qr-and-contact

qr_block:
  type: qr-block__code
  size: 144px
  position: closing-slide-footer
  color: navy-003366
  background: white

ownership_mark:
  enabled: true
  text_kr: "© 2026 광교바른내과"
  text_en: "© 2026 Gwanggyo Bareun Internal Medicine"
  font_size: 11px
  opacity: 0.40
  position: footer-source-source-line
