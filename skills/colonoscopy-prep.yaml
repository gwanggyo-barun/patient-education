test_inputs:
  - case_id: T01-pm-procedure
    description: 오후 검사 (split-dose)
    procedure_time: PM
    patient_age: 60
    prep_drug: polyethylene-glycol
  - case_id: T02-am-procedure
    description: 오전 검사 (전날 저녁 모두 복용)
    procedure_time: AM
    patient_age: 65
    prep_drug: polyethylene-glycol
  - case_id: T03-low-volume-prep
    description: 저용량 prep (sodium picosulfate)
    procedure_time: AM
    patient_age: 75
    prep_drug: sodium-picosulfate

expected_outputs:
  - case_id: T01-pm-procedure
    must_include:
      - "전날 저녁 6시"
      - "맑은 물 같은 변"
      - "노란 액체"
      - "split-dose"
    forbidden_terms:
      - "검은 변 OK"
      - "고형 변"
      - "음식물 잔여물 OK"
  - case_id: T02-am-procedure
    must_include:
      - "전날 저녁"
      - "물 같은 변"
      - "검사 4시간 전"
  - case_id: T03-low-volume-prep
    must_include:
      - "노인"
      - "탈수 주의"
      - "추가 물 섭취"

safety_level: high

