    must_include:
      - "warfarin"
      - "5일 전"
      - "주치의 상의"
      - "출혈 위험"
  - case_id: T03-doac
    must_include:
      - "DOAC"
      - "24-48시간 전"
      - "주치의 상의"
  - case_id: T04-no-sedation
    must_include:
      - "운전 가능"
