test_id: glp1-injection-deck-v02
skill_ref: GBIM-skill-glp1-injection-v02

must_include:
  - "복부"
  - "허벅지"
  - "90도"
  - "주 1회"
  - "냉장 보관 2-8"
  - "광교바른내과"

forbidden_terms:
  - "근육 주사"
  - "동일 부위 매번 같은 곳"
  - "한 번에 최대 용량"
  - "냉동 보관"
  - "임의 용량 증량"
  # ── 클리닉 연락처 오기재(stale contact) 금지 — SoT: blocks/content/clinic-contact-footer.yaml v04
  - "영통구"
  - "수원시"
  - "031-217-5878"
  - "아브뉴프랑"
  - "광교중앙로 145"
  - "304-1호"
  - "광교바름내과"
  # ── 의료 표기 통일(medical notation) — 잘못된 표기 금지
  - "2-8도"
  - "주1회"

style_rules:
  - rule: "Pretendard Variable"
    check_type: html_contains
    check: "pretendardvariable"
    severity: blocker
  - rule: "Navy + Steel Blue + Warning"
    check_type: css_color_whitelist
    check: ["#003366", "#5B9BD5", "#F97316", "#FFFFFF"]
    severity: major

layout_rules:
  - rule: "16:9 deck"
    check_type: viewport
    check: "width=1280"
    severity: blocker
  - rule: "12 슬라이드"
    check_type: section_count
    check: 12
    severity: blocker

safety_rules:
  - rule: "용량 점진 증량 명시"
    check_type: html_contains
    check: "용량 점진 증량"
    severity: blocker
  - rule: "이상반응 시 응급실 안내"
    check_type: html_contains
    check: "응급실"
    severity: blocker
  - rule: "췌장염 증상 안내"
    check_type: html_contains
    check: "심한 복통"
    severity: blocker
  - rule: "전환 시 1주 간격"
    check_type: case_specific
    check: "T02 switching → '이전 약 마지막 투여 후 1주'"
    severity: blocker
  - rule: "노인 저용량 시작"
    check_type: case_specific
    check: "T03 patient_age>=70 → '0.25mg 시작'"
    severity: major

medical_accuracy:
  - rule: "주사 부위 회전"
    check_type: html_contains
    check: "부위 매주 다르게"
    severity: major
  - rule: "보관 온도 2-8°C"
    check_type: html_contains
    check: "2-8"
    severity: blocker
  - rule: "임신 금기 (특정 약)"
    check_type: html_contains
    check: "임신·수유"
    severity: blocker

brand_compliance:
  # ── OG meta 7종 (공유 카드/SEO) — head에 모두 등록되어야 함
  - rule: "OG meta: og:type"
    check_type: html_contains
    check: 'property="og:type"'
    severity: major
  - rule: "OG meta: og:url"
    check_type: html_contains
    check: 'property="og:url"'
    severity: major
  - rule: "OG meta: og:title"
    check_type: html_contains
    check: 'property="og:title"'
    severity: major
  - rule: "OG meta: og:description"
    check_type: html_contains
    check: 'property="og:description"'
    severity: major
  - rule: "OG meta: og:image"
    check_type: html_contains
    check: 'property="og:image"'
    severity: major
  - rule: "OG meta: og:site_name = 광교바른내과"
    check_type: html_contains
    check: 'property="og:site_name" content="광교바른내과"'
    severity: major
  - rule: "OG meta: theme-color Navy #003366"
    check_type: html_contains
    check: 'name="theme-color" content="#003366"'
    severity: major
